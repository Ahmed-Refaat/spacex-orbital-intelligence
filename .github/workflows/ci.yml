name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Backend Tests & Quality
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio mypy ruff bandit safety
      
      - name: Run tests with coverage
        run: |
          cd backend
          pytest tests/ \
            --cov=app \
            --cov-report=xml \
            --cov-report=term \
            --cov-fail-under=80 \
            -v
        env:
          REDIS_URL: redis://localhost:6379/0
          SPICE_URL: http://localhost:50000
          TESTING: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
      
      - name: Type checking with mypy
        run: |
          cd backend
          mypy app --ignore-missing-imports --no-strict-optional
      
      - name: Linting with ruff
        run: |
          cd backend
          ruff check app/ --select E,F,W,C90,I --ignore E501
      
      - name: Security scan with bandit
        run: |
          cd backend
          bandit -r app/ -ll -f json -o bandit-report.json || true
          bandit -r app/ -ll
      
      - name: Dependency vulnerability scan
        run: |
          cd backend
          safety check --json || true

  # Frontend Tests & Quality
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci
      
      - name: Type checking
        run: |
          cd frontend
          npm run type-check || true
      
      - name: Linting
        run: |
          cd frontend
          npm run lint || true
      
      - name: Build
        run: |
          cd frontend
          npm run build
      
      - name: Run tests (if exist)
        run: |
          cd frontend
          npm test -- --run || true

  # Security Audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
      
      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # Docker Build Test
  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false
          tags: spacex-orbital-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: spacex-orbital-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Integration Tests (optional - requires SPICE)
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Start services with Docker Compose
        run: |
          docker-compose up -d
          sleep 30  # Wait for services to be ready
      
      - name: Check service health
        run: |
          curl --fail http://localhost:8000/health || exit 1
      
      - name: Run integration tests
        run: |
          pip install pytest httpx
          pytest backend/tests/integration/ -v || true
      
      - name: Stop services
        run: docker-compose down

  # Report Status
  report:
    name: Report Results
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-audit, docker-build]
    if: always()
    
    steps:
      - name: Check test results
        run: |
          if [ "${{ needs.backend-tests.result }}" == "failure" ]; then
            echo "❌ Backend tests failed"
            exit 1
          fi
          
          if [ "${{ needs.frontend-tests.result }}" == "failure" ]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi
          
          if [ "${{ needs.docker-build.result }}" == "failure" ]; then
            echo "❌ Docker build failed"
            exit 1
          fi
          
          echo "✅ All checks passed!"
