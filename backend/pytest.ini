[pytest]
# Pytest configuration for spacex-orbital-intelligence

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Coverage
addopts =
    --verbose
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml
    --cov-fail-under=80
    -ra
    --tb=short

# Async support
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (requires services)
    slow: Slow tests (>1s)
    security: Security-related tests
    performance: Performance benchmarks

# Environment variables for testing
env =
    TESTING=true
    REDIS_URL=redis://localhost:6379/0
    SPICE_URL=http://localhost:50000
    LOG_LEVEL=INFO

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info dist build node_modules

# Timeout (prevent hanging tests)
timeout = 300

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
