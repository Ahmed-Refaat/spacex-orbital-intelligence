services:
  # SPICE Service - OMM/SGP4 Propagation Engine
  spice:
    image: ghcr.io/haisamido/spice:latest
    container_name: spacex-orbital-spice
    ports:
      - "127.0.0.1:50000:3000"
    environment:
      - SGP4_POOL_SIZE=12
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/spice/sgp4/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Backend API
  backend:
    build: ./backend
    container_name: spacex-orbital-backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "4"]
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set}@redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://spacex:${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD not set}@postgres:5432/spacex_orbital
      - SPICE_URL=http://spice:3000
      - DEBUG=false
    depends_on:
      - redis
      - postgres
      - spice
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # Frontend (dev mode or build)
  frontend:
    build: ./frontend
    container_name: spacex-orbital-frontend
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: spacex-orbital-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:?ERROR: REDIS_PASSWORD not set}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL (optional, for persistence)
  postgres:
    image: postgres:16-alpine
    container_name: spacex-orbital-postgres
    environment:
      - POSTGRES_USER=spacex
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?ERROR: POSTGRES_PASSWORD not set}
      - POSTGRES_DB=spacex_orbital
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spacex -d spacex_orbital"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
  postgres_data:

networks:
  default:
    name: spacex-orbital-network
